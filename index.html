<!DOCTYPE html>
<html>
<head>
<title>Sales Insight Automator</title>
</head>

<body>

<h2>Upload Sales CSV</h2>

<input type="file" id="file">

<br><br>

<input type="email" id="email" placeholder="Enter Email">

<br><br>

<button onclick="upload()">Generate Insight</button>

<p id="result"></p>

<script>

async function upload(){

let file = document.getElementById("file").files[0]
let email = document.getElementById("email").value

let formData = new FormData()

formData.append("file",file)
formData.append("email",email)

let response = await fetch("http://localhost:8000/analyze",{
method:"POST",
body:formData
})

let data = await response.json()

document.getElementById("result").innerText=data.summary

}

</script>

</body>
</html>
